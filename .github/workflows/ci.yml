name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bugi-hub-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Production build
        run: npm run build

      - name: Build container
        run: docker build --tag bugi-hub:ci .

      - name: Verify container health
        shell: bash
        run: |
          set -euo pipefail
          container="bugi-hub-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() { docker rm --force "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          docker run --detach --name "$container" --publish 127.0.0.1:18080:8080 bugi-hub:ci
          test "$(docker inspect --format '{{.Config.User}}' "$container")" = "nextjs"

          for attempt in {1..30}; do
            health="$(docker inspect --format '{{.State.Health.Status}}' "$container")"
            if [[ "$health" == "healthy" ]]; then
              break
            fi
            if [[ "$health" == "unhealthy" ]]; then
              docker logs "$container"
              exit 1
            fi
            sleep 1
          done

          test "$(docker inspect --format '{{.State.Health.Status}}' "$container")" = "healthy"
          test "$(curl --fail --silent http://127.0.0.1:18080/actuator/health)" = '{"status":"UP"}'

  publish:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Resolve immutable image reference
        id: image
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]]
          test "$sha" = "$GITHUB_SHA"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/yeonji-p/bugi-hub" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push immutable image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.image.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published reference
        run: echo '`${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha }}`' >> "$GITHUB_STEP_SUMMARY"
