name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bugi-hub-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve immutable image reference
        id: image
        shell: bash
        run: |
          sha="$(git rev-parse HEAD)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]]
          test "$sha" = "$GITHUB_SHA"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/yeonji-p/bugi-hub" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Production build
        run: npm run build

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Build and push immutable image
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.image.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published reference
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: echo '`${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha }}`' >> "$GITHUB_STEP_SUMMARY"
